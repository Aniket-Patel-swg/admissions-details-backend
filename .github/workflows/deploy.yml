name: deploy

# Flow:
#   GitHub Repo
#      ↓ (push to main)
#   GitHub Actions
#      ↓
#   Build Docker Image
#      ↓
#   Push to AWS ECR
#      ↓
#   Terraform Apply  (creates/updates ECR + Lambda + API Gateway + IAM, idempotent)
#      ↓
#   aws lambda update-function-code  (rolls the new image out, since TF ignores image_uri)

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "Dockerfile"
      - ".dockerignore"
      - "infra/terraform/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  SERVICE: admissions-backend-apis
  AWS_REGION: ap-south-1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      # Only pass image_tag between jobs — image_uri contains AWS_ACCOUNT_ID and
      # GitHub redacts secret substrings in job outputs (deploy-lambda would get "").
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          TAG="${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          REG="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "uri=${REG}/${SERVICE}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR repository exists (first-deploy bootstrap)
        run: |
          aws ecr describe-repositories --repository-names "$SERVICE" --region "$AWS_REGION" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$SERVICE" --region "$AWS_REGION" >/dev/null

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          provenance: false
          push: true
          tags: |
            ${{ steps.tag.outputs.uri }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.SERVICE }}:latest
          cache-from: type=gha,scope=${{ env.SERVICE }}
          cache-to: type=gha,mode=max,scope=${{ env.SERVICE }}

  terraform:
    needs: build-and-push
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    outputs:
      api_endpoint: ${{ steps.outputs.outputs.api_endpoint }}
      lambda_function_name: ${{ steps.outputs.outputs.lambda_function_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform apply
        run: |
          terraform apply -input=false -auto-approve \
            -var "image_tag=${{ needs.build-and-push.outputs.image_tag }}"

      - name: Capture outputs
        id: outputs
        run: |
          {
            echo "api_endpoint=$(terraform output -raw api_endpoint)"
            echo "lambda_function_name=$(terraform output -raw lambda_function_name)"
          } >> "$GITHUB_OUTPUT"

  deploy-lambda:
    needs: [build-and-push, terraform]
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      LAMBDA_FUNCTION: ${{ needs.terraform.outputs.lambda_function_name }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Lambda function code
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          : "${IMAGE_TAG:?image_tag job output is empty}"
          : "${LAMBDA_FUNCTION:?lambda_function_name job output is empty}"
          : "${AWS_ACCOUNT_ID:?AWS_ACCOUNT_ID secret is not set}"
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${SERVICE}:${IMAGE_TAG}"
          echo "Deploying ${IMAGE_URI} -> ${LAMBDA_FUNCTION}"
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION" \
            --image-uri "$IMAGE_URI" \
            --region "$AWS_REGION" >/dev/null
          aws lambda wait function-updated \
            --function-name "$LAMBDA_FUNCTION" \
            --region "$AWS_REGION"
          aws lambda publish-version \
            --function-name "$LAMBDA_FUNCTION" \
            --description "GH run ${GITHUB_RUN_NUMBER} ${GITHUB_SHA::7}" \
            --region "$AWS_REGION" >/dev/null

      - name: Summary
        run: |
          {
            echo "### Deploy summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| API endpoint | ${{ needs.terraform.outputs.api_endpoint }} |"
            echo "| Image tag | \`${{ needs.build-and-push.outputs.image_tag }}\` |"
            echo "| Lambda | \`${{ needs.terraform.outputs.lambda_function_name }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
